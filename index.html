<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOHAN | Freelancer Techno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; }
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #020617; 
            color: white; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); 
            border: 2px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            position: relative;
            z-index: 10;
        }
        .techno-corner::after {
            content: ""; position: absolute; top: -5px; right: -5px;
            width: 20px; height: 20px; border-top: 4px solid var(--primary); border-right: 4px solid var(--primary);
        }
        .scan-line {
            width: 100%; height: 2px; background: var(--primary);
            opacity: 0.2; position: absolute; top: 0; left: 0;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .gradient-text { 
            background: linear-gradient(90deg, var(--primary), var(--secondary)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }
        img { max-width: 100px; filter: drop-shadow(0 0 10px rgba(0,242,255,0.5)); }
    </style>
</head>
<body>

    <div class="fixed top-0 left-0 w-64 h-64 bg-cyan-500/10 blur-[100px] rounded-full"></div>
    <div class="fixed bottom-0 right-0 w-64 h-64 bg-purple-600/10 blur-[100px] rounded-full"></div>

    <main class="max-w-sm w-full glass rounded-3xl p-10 text-center animate__animated animate__fadeInUp techno-corner">
        <div class="scan-line"></div>
        
        <div class="flex justify-center mb-6 animate__animated animate__zoomIn">
            <img src="img/logojohan2.png" alt="Logo Johan" onerror="this.src='https://via.placeholder.com/100?text=JCREW'">
        </div>
        
        <div class="mb-8">
            <p class="text-[10px] tracking-[0.5em] text-cyan-400 font-bold mb-2">SYSTEM: ACTIVE</p>
            <h1 class="text-4xl font-bold tracking-tighter mb-2">
                HI, I'M <span class="gradient-text">JOHAN</span>
            </h1>
            <p class="text-sm text-gray-400 italic">"Pembuatan Aplikasi Murah & Cepat"</p>
        </div>

        <div class="space-y-4">
            <a href="https://johan-999.vercel.app" target="_blank" 
               class="block w-full py-3 border border-cyan-400 text-cyan-400 font-bold rounded-xl hover:bg-cyan-400 hover:text-black transition-all">
               🌐 VIEW PORTFOLIO
            </a>

            <a href="https://wa.me/6281341300100" target="_blank" 
               class="block w-full py-3 bg-cyan-500 text-black font-bold rounded-xl hover:scale-105 transition-all shadow-lg shadow-cyan-500/50">
               💬 WHATSAPP ME
            </a>
        </div>

        <div class="mt-8 pt-6 border-t border-gray-800">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Direct Line</p>
            <p class="text-lg font-mono font-bold text-white">0813-41-300-100</p>
        </div>
    </main>

</body>
</html>
